<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SUMIKA — 現場写真 AI 工程チェッカー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Noto+Sans+JP:wght@300;400;500&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FAF8F5;--bg2:#F0ECE6;--bg3:#E6DFD8;--white:#FFFFFF;
  --ink:#1C2422;--ink2:#4A5E5A;--ink3:#8AADA8;--ink4:#B4CECA;
  --teal:#1F7A72;--teald:#186660;--teall:#2A9088;
  --tdim:rgba(31,122,114,.07);--tbdr:rgba(31,122,114,.22);
  --green:#2A7A50;--greenbg:rgba(42,122,80,.08);--greenbdr:rgba(42,122,80,.25);
  --amber:#956010;--amberbg:rgba(149,96,16,.07);--amberbdr:rgba(149,96,16,.22);
  --red:#903030;--redbg:rgba(144,48,48,.07);--redbdr:rgba(144,48,48,.22);
  --bdr:rgba(28,36,34,.09);--bdr2:rgba(28,36,34,.16);
  --serif:'Cormorant Garamond',serif;--sans:'Sora',sans-serif;--jp:'Noto Sans JP',sans-serif;
  --r:4px;
}
html,body{min-height:100%;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.6}
button{cursor:pointer;font-family:var(--sans)}
input,select,textarea{font-family:var(--jp)}

.shell{min-height:100vh;display:grid;grid-template-rows:auto 1fr auto}

/* HEADER */
header{padding:15px 40px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bdr);background:var(--white);position:sticky;top:0;z-index:50}
.logo{display:flex;align-items:baseline;gap:7px;text-decoration:none}.logo-main{font-family:var(--serif);font-size:21px;font-weight:400;color:var(--ink);letter-spacing:.04em}.logo-main b{color:var(--teal);font-weight:600}.logo-by{font-size:9.5px;font-weight:400;color:var(--ink4);letter-spacing:.06em;font-family:var(--sans);opacity:.7;margin-top:1px}
.logo b{color:var(--teal);font-weight:600}
.hdr-mid{display:flex;align-items:center;gap:6px}
.hdr-sep{color:var(--ink4);font-size:12px}
.hdr-cur{font-size:11.5px;color:var(--ink2);font-family:var(--jp)}
.hdr-back{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;background:none;border:none;transition:color .2s}
.hdr-back:hover{color:var(--ink)}
.hdr-back svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}

/* LAYOUT */
.layout{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 57px)}

/* SIDEBAR */
.sidebar{background:var(--white);border-right:1px solid var(--bdr);padding:28px 18px;display:flex;flex-direction:column;position:sticky;top:57px;height:calc(100vh - 57px);overflow-y:auto}
.sb-lbl{font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink4);margin-bottom:14px;padding-left:4px}
.step-nav{display:flex;flex-direction:column;gap:2px;flex:1}
.si{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--r);transition:all .2s}
.si.click{cursor:pointer}.si.click:hover{background:var(--bg)}
.si.active{background:var(--tdim);border:1px solid var(--tbdr)}
.si.locked{opacity:.3;pointer-events:none}
.sdot{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--ink4);display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:600;color:var(--ink3);flex-shrink:0;transition:all .2s}
.si.active .sdot{border-color:var(--teal);background:var(--teal);color:#fff}
.si.done .sdot{border-color:var(--green);background:var(--greenbg);color:var(--green);font-size:12px}
.slbl{font-size:12px;font-weight:500;color:var(--ink3);line-height:1.3;transition:color .2s}
.ssub{font-size:10px;color:var(--ink4);font-family:var(--jp)}
.si.active .slbl{color:var(--ink)}
.si.done .slbl{color:var(--ink2)}
.sc{width:1px;height:14px;background:var(--bdr);margin-left:22px}
.sb-info{margin-top:auto;background:var(--tdim);border:1px solid var(--tbdr);border-radius:var(--r);padding:14px 16px;margin-top:16px}
.sb-info-t{font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--teal);margin-bottom:6px}
.sb-info-b{font-size:11px;color:var(--ink2);font-family:var(--jp);line-height:1.75}

/* CONTENT */
.content{padding:36px 48px;max-width:900px}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.panel{animation:fadeUp .3s ease}

/* PAGE HEADER */
.eyebrow{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--teal);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.eyebrow::before{content:'';width:16px;height:1px;background:var(--teal)}
.page-title{font-family:var(--serif);font-size:32px;font-weight:300;color:var(--ink);line-height:1.15;margin-bottom:6px}
.page-title em{font-style:italic;color:var(--teal)}
.page-sub{font-size:13px;color:var(--ink2);font-family:var(--jp);line-height:1.85;max-width:580px;margin-bottom:28px}

/* FORM */
.fs{margin-bottom:24px}
.sh{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink3);padding-bottom:10px;border-bottom:1px solid var(--bdr);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.sh svg{width:14px;height:14px;stroke:var(--ink3);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;opacity:.6}
.fg{display:grid;gap:12px;margin-bottom:12px}
.fg.c2{grid-template-columns:1fr 1fr}.fg.c3{grid-template-columns:1fr 1fr 1fr}.fg.c1{grid-template-columns:1fr}
.field{display:flex;flex-direction:column;gap:5px}
label{font-size:10.5px;font-weight:500;color:var(--ink2);letter-spacing:.08em;text-transform:uppercase;display:flex;align-items:center;gap:5px}
.req{color:var(--teal);font-size:11px}
.field input,.field select,.field textarea{background:var(--bg);border:1px solid var(--bdr2);border-radius:var(--r);padding:10px 13px;color:var(--ink);font-size:13px;outline:none;transition:border-color .2s,background .2s;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--teal);background:var(--white)}
.field textarea{resize:vertical;min-height:80px;line-height:1.75}
.field-hint{font-size:10.5px;color:var(--ink3);font-family:var(--jp)}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:2px}
.chip{padding:5px 14px;border:1px solid var(--bdr2);border-radius:20px;font-size:12px;color:var(--ink2);cursor:pointer;transition:all .18s;background:transparent;font-family:var(--jp)}
.chip.sel{border-color:var(--teal);background:var(--tdim);color:var(--ink)}

/* MILESTONES CHECKLIST */
.milestone-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
.mitem{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg);border:1px solid var(--bdr);border-radius:var(--r);cursor:pointer;transition:all .18s}
.mitem.checked{background:var(--tdim);border-color:var(--tbdr)}
.mcheck{width:18px;height:18px;border-radius:3px;border:1.5px solid var(--ink4);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.mitem.checked .mcheck{background:var(--teal);border-color:var(--teal)}
.mcheck-mark{width:8px;height:5px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(-45deg) translate(1px,-1px);display:none}
.mitem.checked .mcheck-mark{display:block}
.mlabel{font-size:12.5px;font-family:var(--jp);color:var(--ink2)}
.mitem.checked .mlabel{color:var(--ink);font-weight:500}

/* UPLOAD ZONE */
.upload-zone{border:2px dashed var(--bdr2);border-radius:6px;padding:36px 24px;text-align:center;cursor:pointer;transition:all .25s;background:var(--white);position:relative}
.upload-zone:hover,.upload-zone.drag{border-color:var(--teal);background:var(--tdim)}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-icon{width:48px;height:48px;border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.upload-icon svg{width:22px;height:22px;stroke:var(--teal);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.upload-title{font-size:14px;font-weight:500;color:var(--ink);margin-bottom:5px}
.upload-sub{font-size:12px;color:var(--ink3);font-family:var(--jp);line-height:1.7}
.upload-limit{font-size:11px;color:var(--ink4);margin-top:8px}

/* PREVIEW GRID */
.preview-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px}
.preview-item{position:relative;border-radius:var(--r);overflow:hidden;background:var(--bg2);aspect-ratio:4/3}
.preview-item img{width:100%;height:100%;object-fit:cover}
.preview-remove{position:absolute;top:5px;right:5px;width:22px;height:22px;border-radius:50%;background:rgba(28,36,34,.7);color:#fff;border:none;font-size:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s;line-height:1}
.preview-remove:hover{background:var(--red)}
.preview-name{position:absolute;bottom:0;left:0;right:0;font-size:9.5px;color:#fff;background:rgba(28,36,34,.6);padding:3px 6px;font-family:var(--sans);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.photo-count{font-size:12px;color:var(--teal);font-weight:500;margin-top:10px;font-family:var(--jp)}

/* BUTTONS */
.btn-row{display:flex;gap:10px;align-items:center;margin-top:28px;padding-top:20px;border-top:1px solid var(--bdr)}
.btn-primary{background:var(--ink);color:var(--bg);font-size:11.5px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;padding:12px 28px;border:none;border-radius:var(--r);transition:all .2s;display:flex;align-items:center;gap:8px}
.btn-primary:hover{background:var(--teal)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--ink2);font-size:11.5px;letter-spacing:.08em;text-transform:uppercase;padding:11px 20px;border:1px solid var(--bdr2);border-radius:var(--r);transition:all .2s}
.btn-ghost:hover{color:var(--ink);background:var(--bg2)}

/* ANALYZING */
.ana-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:65vh;text-align:center;padding:40px}
.ana-ring{width:100px;height:100px;border-radius:50%;border:1px solid var(--bdr2);position:relative;margin-bottom:28px;display:flex;align-items:center;justify-content:center}
.ana-ring::before{content:'';position:absolute;inset:-1px;border-radius:50%;border:1.5px solid transparent;border-top-color:var(--teal);border-right-color:var(--teall);animation:spin 1.4s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ana-inner{width:62px;height:62px;border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center}
.ana-inner svg{width:26px;height:26px;stroke:var(--teal);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.ana-title{font-family:var(--serif);font-size:28px;font-weight:300;color:var(--ink);margin-bottom:8px}
.ana-sub{font-size:13px;color:var(--ink2);font-family:var(--jp);line-height:1.9;max-width:400px;margin-bottom:24px}
.ana-photo-progress{width:100%;max-width:400px;background:var(--bg2);border-radius:20px;height:6px;overflow:hidden;margin-bottom:8px}
.ana-photo-bar{height:100%;background:linear-gradient(90deg,var(--teal),var(--teall));border-radius:20px;transition:width .5s ease}
.ana-photo-lbl{font-size:12px;color:var(--ink3);font-family:var(--jp)}
.ana-steps{display:flex;flex-direction:column;gap:7px;width:100%;max-width:380px;margin-top:16px}
.as{display:flex;align-items:center;gap:10px;padding:9px 14px;background:var(--white);border:1px solid var(--bdr);border-radius:var(--r);font-size:12px;font-family:var(--jp);color:var(--ink3);text-align:left;transition:all .25s}
.as.act{border-color:var(--tbdr);color:var(--ink);background:var(--tdim)}
.as.done{border-color:var(--greenbdr);color:var(--ink3)}
.asdot{width:7px;height:7px;border-radius:50%;background:var(--ink4);flex-shrink:0;transition:background .3s}
.as.act .asdot{background:var(--teal);animation:pulse 1s ease-in-out infinite}
.as.done .asdot{background:var(--green)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* RESULT */
.res-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.rbadge{display:flex;align-items:center;gap:6px;font-size:10.5px;color:var(--green);border:1px solid var(--greenbdr);background:var(--greenbg);border-radius:20px;padding:4px 14px;letter-spacing:.08em;text-transform:uppercase}
.rbadge::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--green)}
.r-actions{display:flex;gap:8px}
.btn-sm{padding:7px 14px;font-size:11px;letter-spacing:.08em;text-transform:uppercase;border-radius:var(--r);transition:all .2s}
.btn-sm.outline{background:transparent;border:1px solid var(--bdr2);color:var(--ink2)}
.btn-sm.outline:hover{border-color:var(--teal);color:var(--teal)}
.btn-sm.solid{background:var(--ink);border:none;color:var(--bg);font-weight:500}
.btn-sm.solid:hover{background:var(--teal)}

/* SUMMARY HERO */
.summary-hero{background:var(--ink);border-radius:8px;overflow:hidden;margin-bottom:20px}
.sh-accent{height:4px;background:linear-gradient(90deg,var(--teal),var(--teall))}
.sh-body{padding:28px 36px;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:1px;background:rgba(255,255,255,.08)}
.sh-cell{background:var(--ink);padding:20px 24px;text-align:center}
.sh-cell-val{font-family:var(--serif);font-size:40px;font-weight:300;line-height:1}
.sh-cell-lbl{font-size:10px;color:rgba(255,255,255,.4);font-family:var(--jp);margin-top:5px;letter-spacing:.06em}
.c-teal-txt{color:var(--teall)}
.c-green-txt{color:#4ACA88}
.c-amber-txt{color:#E0A040}
.c-red-txt{color:#E06060}
.sh-footer{padding:16px 36px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid rgba(255,255,255,.08)}
.sh-footer-lbl{font-size:10.5px;color:rgba(255,255,255,.35);font-family:var(--jp)}
.sh-footer-val{font-size:12.5px;color:rgba(255,255,255,.7);font-family:var(--jp);font-weight:500}

/* PROGRESS BAR SECTION */
.progress-section{background:var(--white);border:1px solid var(--bdr);border-radius:6px;padding:24px 28px;margin-bottom:16px}
.ms-row{display:flex;align-items:center;gap:14px;padding:9px 0;border-bottom:1px solid var(--bdr)}
.ms-row:last-child{border-bottom:none}
.ms-name{font-size:13px;font-family:var(--jp);color:var(--ink2);flex:1;min-width:0}
.ms-bar-wrap{width:140px;height:8px;background:var(--bg2);border-radius:4px;overflow:hidden;flex-shrink:0}
.ms-bar{height:100%;border-radius:4px;transition:width .6s ease}
.ms-pct{font-size:12px;font-weight:600;font-family:var(--sans);width:36px;text-align:right;flex-shrink:0}
.ms-status{width:60px;text-align:right;flex-shrink:0}
.ms-badge{font-size:9.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:2px 8px;border-radius:20px}
.mb-ok{background:var(--greenbg);color:var(--green)}
.mb-partial{background:var(--amberbg);color:var(--amber)}
.mb-ng{background:var(--redbg);color:var(--red)}
.mb-na{background:var(--bg2);color:var(--ink3)}

/* PHOTO RESULTS */
.sec-head{display:flex;align-items:center;gap:11px;margin:24px 0 14px}
.sec-num{width:24px;height:24px;border-radius:50%;background:var(--teal);color:#fff;font-size:10.5px;font-weight:600;display:flex;align-items:center;justify-content:center;font-family:var(--sans);flex-shrink:0}
.sec-title{font-size:11.5px;font-weight:600;color:var(--ink);letter-spacing:.14em;text-transform:uppercase}
.sec-note{font-size:11px;color:var(--ink3);font-family:var(--jp);margin-left:auto}

.photo-results{display:flex;flex-direction:column;gap:14px}
.photo-card{background:var(--white);border:1px solid var(--bdr);border-radius:6px;overflow:hidden;transition:all .2s}
.photo-card:hover{border-color:var(--tbdr);box-shadow:0 4px 16px rgba(28,36,34,.06)}
.photo-card-inner{display:grid;grid-template-columns:200px 1fr}
.photo-thumb{position:relative;overflow:hidden;background:var(--bg2)}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
.photo-thumb-overlay{position:absolute;bottom:0;left:0;right:0;padding:6px 10px;background:linear-gradient(transparent,rgba(28,36,34,.8))}
.photo-fname{font-size:9.5px;color:rgba(255,255,255,.8);font-family:var(--sans);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.photo-body{padding:18px 20px;display:flex;flex-direction:column;gap:10px}
.photo-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.photo-subject{font-size:14px;font-weight:500;color:var(--ink);font-family:var(--jp);line-height:1.4}
.risk-badge{font-size:9.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:3px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.risk-ok{background:var(--greenbg);color:var(--green);border:1px solid var(--greenbdr)}
.risk-warn{background:var(--amberbg);color:var(--amber);border:1px solid var(--amberbdr)}
.risk-danger{background:var(--redbg);color:var(--red);border:1px solid var(--redbdr)}
.photo-findings{font-size:12.5px;font-family:var(--jp);color:var(--ink2);line-height:1.85}
.photo-tags{display:flex;flex-wrap:wrap;gap:5px}
.photo-tag{font-size:10.5px;font-family:var(--jp);padding:3px 10px;border-radius:20px;border:1px solid var(--bdr);background:var(--bg);color:var(--ink2)}
.photo-tag.ok{background:var(--greenbg);border-color:var(--greenbdr);color:var(--green)}
.photo-tag.warn{background:var(--amberbg);border-color:var(--amberbdr);color:var(--amber)}
.photo-tag.ng{background:var(--redbg);border-color:var(--redbdr);color:var(--red)}
.photo-actions-needed{background:var(--redbg);border:1px solid var(--redbdr);border-radius:var(--r);padding:10px 14px;font-size:12px;font-family:var(--jp);color:var(--red);line-height:1.8;margin-top:4px}
.photo-actions-needed::before{content:'⚠ 要対応: ';font-weight:600}

/* RECOMMENDATIONS */
.rec-list{display:flex;flex-direction:column;gap:10px}
.rec-item{background:var(--white);border:1px solid var(--bdr);border-radius:6px;padding:16px 20px;display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:start}
.rec-item.urgent{border-color:var(--redbdr);background:var(--redbg)}
.rec-item.warn{border-color:var(--amberbdr)}
.rec-prio{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.prio-high{background:var(--redbg);color:var(--red);border:1.5px solid var(--redbdr)}
.prio-mid{background:var(--amberbg);color:var(--amber);border:1.5px solid var(--amberbdr)}
.prio-low{background:var(--greenbg);color:var(--green);border:1.5px solid var(--greenbdr)}
.rec-title{font-size:13px;font-weight:500;color:var(--ink);font-family:var(--jp);margin-bottom:4px}
.rec-body{font-size:12.5px;color:var(--ink2);font-family:var(--jp);line-height:1.8}
.rec-who{font-size:10.5px;color:var(--ink3);margin-top:6px;font-family:var(--sans);letter-spacing:.06em;text-transform:uppercase}

/* OVERALL COMMENT */
.overall-box{background:var(--white);border:1px solid var(--bdr);border-radius:6px;padding:22px 26px;border-left:3px solid var(--teal)}
.overall-lbl{font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--teal);margin-bottom:10px;font-family:var(--sans)}
.overall-text{font-size:13.5px;font-family:var(--jp);color:var(--ink2);line-height:2.0}

/* ERROR */
.err-box{background:var(--redbg);border:1px solid var(--redbdr);border-radius:var(--r);padding:16px 20px;font-size:13px;font-family:var(--jp);color:var(--red);line-height:1.75}

/* FOOTER */
footer{border-top:1px solid var(--bdr);padding:12px 40px;display:flex;justify-content:space-between;align-items:center;background:var(--white)}
footer span{font-size:10px;color:var(--ink3);font-family:var(--jp)}
footer .ver{font-family:var(--sans);letter-spacing:.08em}

@media(max-width:800px){
  .layout{grid-template-columns:1fr}.sidebar{display:none}.content{padding:20px 16px}

<script>

const S = {

const PHASES = ['基礎工事','土台・床組','上棟・木工事','屋根工事','外壁・サッシ工事','内装下地','内装仕上げ','設備工事','外構工事','竣工検査'];

  '土台・床組':['土台敷き','大引き設置','床下断熱','床合板張り','1階床完成'],

  '屋根工事':['ルーフィング張り','瓦・スレート葺き','棟板金取付','雨樋設置','屋根完成'],

  '設備工事':['ユニットバス設置','キッチン設置','洗面台設置','衛生器具取付','設備検査'],

/* ── SIDEBAR ── */
function renderSidebar(){
  document.getElementById('stepNav').innerHTML = STEPS.map((s,i)=>{
    const st = s.id<S.step?'done click':s.id===S.step?'active':'locked';
    const icon = s.id<S.step?'✓':s.id;
    const conn = i<STEPS.length-1?'<div class="sc"></div>':'';
    return `<div class="si ${st}" onclick="jumpStep(${s.id})">
      <div class="sdot">${icon}</div>
      <div><div class="slbl">${s.label}</div><div class="ssub">${s.sub}</div></div>
    </div>${conn}`;
  }).join('');
}
function jumpStep(id){ if(id<S.step){S.step=id;render();} }

function svgI(path){
  return `<svg viewBox="0 0 24 24">${path}</svg>`;
}

/* ── STEP 1 ── */

  <h1 class="page-title">現場プロジェクト<em>情報</em></h1>

  <div class="fs">
    <div class="sh">${svgI('<path d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/>')} 現場情報</div>
    <div class="fg c2">

    <div class="fg c2">
      <div class="field"><label>現在の工程フェーズ <span class="req">*</span></label>
        <select id="phase" onchange="updateMilestones()">

    </div>

    <div class="sh">${svgI('<path d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/>')} 確認するマイルストーン（完了しているものにチェック）</div>

      ${ms.map(m=>`

        <div class="mcheck"><div class="mcheck-mark"></div></div>

      </div>`).join('')}

    <div class="sh">${svgI('<path d="M7.5 8.25h9m-9 3H12m-9.75 1.51c0 1.6 1.123 2.994 2.707 3.227 1.129.166 2.27.293 3.423.379.35.026.67.21.865.501L12 21l2.755-4.133a1.14 1.14 0 0 1 .865-.501 48.172 48.172 0 0 0 3.423-.379c1.584-.233 2.707-1.626 2.707-3.228V6.741c0-1.602-1.123-2.995-2.707-3.228A48.394 48.394 0 0 0 12 3c-2.392 0-4.744.175-7.043.513C3.373 3.746 2.25 5.14 2.25 6.741v6.018Z"/>')} AI への指示・特記事項</div>
    <div class="fg c1">
      <div class="field">
        <textarea id="notes" placeholder="例：先週の雨の影響が心配。防水施工の確認を特にしてほしい。">${f.notes}</textarea>

      </div>

  <div class="btn-row">
    <button class="btn-primary" onclick="next(1)">次へ：写真をアップロード →</button>

function updateMilestones(){
  const phase=document.getElementById('phase').value;
  S.form.phase=phase;
  S.form.milestones=[];
  const ms=MILESTONE_SETS[phase]||[];
  document.getElementById('milestoneGrid').innerHTML=ms.map(m=>`
    <div class="mitem" onclick="toggleMilestone('${m}')">
      <div class="mcheck"><div class="mcheck-mark"></div></div>
      <span class="mlabel">${m}</span>
    </div>`).join('');
}

function toggleMilestone(m){
  const arr=S.form.milestones, i=arr.indexOf(m);
  if(i>-1) arr.splice(i,1); else arr.push(m);
  // re-render milestone grid only
  const phase=S.form.phase;
  const ms=MILESTONE_SETS[phase]||[];
  document.getElementById('milestoneGrid').innerHTML=ms.map(x=>`
    <div class="mitem${S.form.milestones.includes(x)?' checked':''}" onclick="toggleMilestone('${x}')">
      <div class="mcheck"><div class="mcheck-mark"></div></div>
      <span class="mlabel">${x}</span>
    </div>`).join('');
}

/* ── STEP 2 ── */

  return `<div class="panel">
  <div class="eyebrow">Step 2 of 2</div>
  <h1 class="page-title">写真<em>アップロード</em></h1>
  <p class="page-sub">現場写真をアップロードしてください。AIが各写真を個別に解析します。最大6枚まで。</p>

  <div class="fs">
    <div class="sh">${svgI('<path d="M6.827 6.175A2.31 2.31 0 0 1 5.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 0 0-1.134-.175 2.31 2.31 0 0 1-1.64-1.055l-.822-1.316a2.192 2.192 0 0 0-1.736-1.039 48.774 48.774 0 0 0-5.232 0 2.192 2.192 0 0 0-1.736 1.039l-.821 1.316Z"/><path d="M16.5 12.75a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0ZM18.75 10.5h.008v.008h-.008V10.5Z"/>')} 現場写真</div>

    <div class="upload-zone" id="uploadZone" ondragover="dragOver(event)" ondragleave="dragLeave()" ondrop="dropFiles(event)">
      <input type="file" accept="image/*" multiple id="fileInput" onchange="handleFiles(this.files)">
      <div class="upload-icon">${svgI('<path d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5m-13.5-9L12 3m0 0 4.5 4.5M12 3v13.5"/>')}</div>
      <div class="upload-title">写真をドラッグ＆ドロップ</div>
      <div class="upload-sub">またはクリックしてファイルを選択<br>JPG・PNG・HEIC対応</div>
      <div class="upload-limit">最大6枚 · 各ファイル最大10MB</div>
    </div>

    ${count>0?`
    <div class="photo-count">✓ ${count}枚 選択済み</div>
    <div class="preview-grid" id="previewGrid">
      ${S.photos.map((p,i)=>`
      <div class="preview-item">
        <img src="${p.dataUrl}" alt="${p.name}">
        <button class="preview-remove" onclick="removePhoto(${i})">✕</button>
        <div class="preview-name">${p.name}</div>
      </div>`).join('')}
    </div>`:''}

    <div style="margin-top:16px;padding:12px 16px;background:var(--tdim);border:1px solid var(--tbdr);border-radius:var(--r);font-size:12px;font-family:var(--jp);color:var(--ink2);line-height:1.8">
      📷 <strong>撮影のヒント：</strong>
      基礎・構造部分は近距離＋遠距離の2枚セットで。雨養生・防水シートは全体が映るように。問題箇所は定規や手を添えてスケール感を出すと精度が上がります。
    </div>
  </div>

  <div class="btn-row">
    <button class="btn-primary" onclick="analyze()" ${count===0?'disabled':''}>
      ${svgI('<path d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z"/><path d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>')}
      AI解析を開始する（${count}枚）
    </button>
    <button class="btn-ghost" onclick="prev()">← 戻る</button>
  </div>
</div>`;
}

/* ── IMAGE COMPRESSION ── */
function compressImage(file,maxPx=1024,quality=0.75){
  return new Promise(resolve=>{
    const img=new Image(),url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      let{width:w,height:h}=img;
      if(w>maxPx||h>maxPx){if(w>h){h=Math.round(h*maxPx/w);w=maxPx;}else{w=Math.round(w*maxPx/h);h=maxPx;}}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      resolve(c.toDataURL('image/jpeg',quality));
    };
    img.onerror=()=>{URL.revokeObjectURL(url);resolve(null);};
    img.src=url;
  });
}

function handleFiles(files){
  const arr=Array.from(files).slice(0,6-S.photos.length);
  if(!arr.length) return;
  let done=0;
  arr.forEach(file=>{
    if(!file.type.startsWith('image/')) return;
    const reader=new FileReader();
    reader.onload=e=>{
      const originalUrl=e.target.result;
      const idx=S.photos.push({file,dataUrl:originalUrl,compressed:null,name:file.name})-1;
      compressImage(file,1024,0.75).then(comp=>{
        if(S.photos[idx]) S.photos[idx].compressed=comp||originalUrl;
        done++; if(done===arr.length) render();
      });
    };
    reader.readAsDataURL(file);
  });
}
function removePhoto(i){ S.photos.splice(i,1); render(); }
function dragOver(e){ e.preventDefault(); document.getElementById('uploadZone').classList.add('drag'); }
function dragLeave(){ document.getElementById('uploadZone').classList.remove('drag'); }
function dropFiles(e){ e.preventDefault(); dragLeave(); handleFiles(e.dataTransfer.files); }

}

/* ── RESULT SCREEN ── */
function resultScreen(){
  if(S.error) return `<div class="panel">
    <div class="eyebrow">エラー</div>
    <h1 class="page-title">解析に<em>失敗</em>しました</h1>
    <div class="err-box" style="margin-top:24px">${S.error}</div>
    <div class="btn-row">
      <button class="btn-primary" onclick="analyze()">再試行する</button>
      <button class="btn-ghost" onclick="goBack()">← フォームに戻る</button>
    </div>
  </div>`;
  const r=S.result; if(!r) return '';
  const d=new Date(); const ds=`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
  const riskColor={'良好':'c-green-txt','要確認':'c-amber-txt','要是正':'c-red-txt','不明':'c-teal-txt'};

  const msHtml=(r.milestoneStatus||[]).map(ms=>{
    const pct=ms.pct||0;
    const barColor=pct>=80?'#2A7A50':pct>=50?'#956010':'#903030';
    const bClass=pct>=80?'mb-ok':pct>=50?'mb-partial':'mb-ng';
    const bLabel=pct>=80?'完了':pct>=50?'進行中':'未完/不明';
    return `<div class="ms-row">
      <div class="ms-name">${ms.name}</div>
      <div class="ms-bar-wrap"><div class="ms-bar" style="width:${pct}%;background:${barColor}"></div></div>
      <div class="ms-pct" style="color:${barColor}">${pct}%</div>
      <div class="ms-status"><span class="ms-badge ${bClass}">${bLabel}</span></div>
    </div>`;
  }).join('');

  const photoHtml=(r.photos||[]).map((ph,i)=>{
    const rClass=ph.riskLevel==='問題なし'||ph.riskLevel==='良好'?'risk-ok':ph.riskLevel==='要確認'?'risk-warn':'risk-danger';
    const tagsHtml=(ph.tags||[]).map(t=>`<span class="photo-tag ${t.type||''}">${t.label}</span>`).join('');
    const photoData=S.photos[i];
    return `<div class="photo-card">
      <div class="photo-card-inner">
        <div class="photo-thumb">
          ${photoData?`<img src="${photoData.dataUrl}" alt="photo${i+1}">`:`<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--ink3);font-size:12px;padding:20px">写真 ${i+1}</div>`}
          <div class="photo-thumb-overlay"><div class="photo-fname">写真 ${i+1}${photoData?' · '+photoData.name:''}</div></div>
        </div>
        <div class="photo-body">
          <div class="photo-header">
            <div class="photo-subject">${ph.subject||'—'}</div>
            <span class="risk-badge ${rClass}">${ph.riskLevel||'—'}</span>
          </div>
          <div class="photo-findings">${ph.findings||''}</div>
          ${(ph.tags||[]).length?`<div class="photo-tags">${tagsHtml}</div>`:''}
          ${ph.actionRequired?`<div class="photo-actions-needed">${ph.actionRequired}</div>`:''}
        </div>
      </div>
    </div>`;
  }).join('');

  const recHtml=(r.recommendations||[]).map(rec=>{
    const pClass=rec.priority==='高'?'prio-high':rec.priority==='中'?'prio-mid':'prio-low';
    const cardClass=rec.priority==='高'?'urgent':rec.priority==='中'?'warn':'';
    return `<div class="rec-item ${cardClass}">
      <div class="rec-prio ${pClass}">${rec.priority}</div>
      <div>
        <div class="rec-title">${rec.title}</div>
        <div class="rec-body">${rec.body}</div>
        ${rec.who?`<div class="rec-who">担当: ${rec.who}</div>`:''}
      </div>
    </div>`;
  }).join('');

  return `<div class="panel">
  <div class="res-topbar">
    <div>
      <div class="eyebrow">解析完了</div>
      <h1 class="page-title" style="font-size:22px">${S.form.projectName}<em>工程レポート</em></h1>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:10px">
      <span class="rbadge">AI解析完了 · ${ds}</span>
      <div class="r-actions">
        <button class="btn-sm outline" onclick="analyze()">↻ 再解析</button>
        <button class="btn-sm outline" onclick="window.print()">🖨 印刷</button>
        <button class="btn-sm solid" onclick="goBack()">＋ 新規チェック</button>
      </div>
    </div>
  </div>

  <!-- SUMMARY HERO -->
  <div class="summary-hero">
    <div class="sh-accent"></div>
    <div class="sh-body">
      <div class="sh-cell"><div class="sh-cell-val ${riskColor[r.overallStatus]||'c-teal-txt'}">${r.overallStatus||'—'}</div><div class="sh-cell-lbl">総合判定</div></div>
      <div class="sh-cell"><div class="sh-cell-val c-teal-txt">${r.progressPct||0}<span style="font-size:18px;color:rgba(255,255,255,.4)">%</span></div><div class="sh-cell-lbl">工程進捗率</div></div>
      <div class="sh-cell"><div class="sh-cell-val c-amber-txt">${r.issueCount||0}</div><div class="sh-cell-lbl">要確認事項</div></div>
      <div class="sh-cell"><div class="sh-cell-val c-red-txt">${r.urgentCount||0}</div><div class="sh-cell-lbl">要是正（緊急）</div></div>
    </div>
    <div class="sh-footer">
      <div class="sh-footer-lbl">対象現場</div>
      <div class="sh-footer-val">${S.form.projectName} ／ ${S.form.phase} ／ 解析枚数：${S.photos.length}枚</div>
    </div>
  </div>

  <!-- MILESTONE STATUS -->
  <div class="sec-head"><div class="sec-num">01</div><div class="sec-title">マイルストーン進捗</div></div>
  <div class="progress-section">${msHtml||'<div style="font-size:13px;color:var(--ink3);font-family:var(--jp);padding:8px 0">マイルストーン情報なし</div>'}</div>

  <!-- PHOTO RESULTS -->
  <div class="sec-head"><div class="sec-num">02</div><div class="sec-title">写真別解析結果</div><div class="sec-note">${S.photos.length}枚解析</div></div>
  <div class="photo-results">${photoHtml}</div>

  <!-- RECOMMENDATIONS -->
  ${(r.recommendations||[]).length?`
  <div class="sec-head"><div class="sec-num">03</div><div class="sec-title">是正・確認事項</div><div class="sec-note">優先度順</div></div>
  <div class="rec-list">${recHtml}</div>`:''}

  <!-- OVERALL -->
  <div class="sec-head"><div class="sec-num">${(r.recommendations||[]).length?'04':'03'}</div><div class="sec-title">監督員コメント（AI）</div></div>
  <div class="overall-box">
    <div class="overall-lbl">総合所見</div>
    <div class="overall-text">${r.overallComment||''}</div>
  </div>
</div>`;
}

/* ── RENDER ── */
function render(){
  renderSidebar();
  const c=document.getElementById('content');
  if(S.step===1) c.innerHTML=step1();
  else if(S.step===2) c.innerHTML=step2();
  else if(S.step===3) c.innerHTML=anaScreen();
  else if(S.step===4) c.innerHTML=resultScreen();
  attachListeners();
  window.scrollTo({top:0,behavior:'smooth'});
}

function attachListeners(){
  ['projectName','clientName','supervisor','notes'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.addEventListener('input',e=>S.form[id]=e.target.value);
  });
  ['phase'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.addEventListener('change',e=>S.form[id]=e.target.value);
  });
}

function next(from){
  if(from===1&&!S.form.projectName.trim()){alert('現場名を入力してください');return;}
  S.step=from+1; render();
}
function prev(){ S.step--; render(); }
function goBack(){ S.step=1; S.result=null; S.error=null; render(); }

/* ── ANALYZE ── */
async function analyze(){
  if(S.photos.length===0){alert('写真を1枚以上アップロードしてください');return;}
  S.step=3; S.result=null; S.error=null; render();

  // Animate steps
  const ids=['as1','as2','as3','as4','as5'];
  let idx=0;
  function tick(){
    if(idx>0){const p=document.getElementById(ids[idx-1]);if(p){p.classList.remove('act');p.classList.add('done');}}
    if(idx<ids.length){
      const el=document.getElementById(ids[idx]);if(el)el.classList.add('act');
      const bar=document.getElementById('anaBar');if(bar)bar.style.width=((idx+1)/ids.length*85)+'%';
      const lbl=document.getElementById('anaLbl');
      if(lbl){
        const msgs=['プロジェクト情報を確認中...','写真を1枚ずつ解析中...','マイルストーンと照合中...','品質リスクを評価中...','レポートを生成中...'];
        lbl.textContent=msgs[idx]||'処理中...';
      }
      idx++;setTimeout(tick,1100);
    }
  }
  tick();

  const f=S.form;

  // Build image content blocks — use compressed version for API
  const imageBlocks = S.photos.map((p,i)=>{
    const src=p.compressed||p.dataUrl;
    return [
      {type:'text',text:`【写真${i+1}：${p.name}】`},
      {type:'image',source:{type:'base64',media_type:'image/jpeg',data:src.split(',')[1]}}
    ];
  }).flat();

  const textBlock = {type:'text',text:`あなたは経験豊富な日本の住宅建築工事の現場監督です。
以下の現場写真を解析し、工程進捗・品質・安全に関するレポートをJSONのみで返してください。バッククォートや説明文は不要です。

【現場情報】
- 現場名: ${f.projectName}
- 施主: ${f.clientName}
- 工程フェーズ: ${f.phase}
- 完了済みマイルストーン: ${f.milestones.join('、')||'未選択'}
- 特記事項: ${f.notes||'なし'}

【解析する写真】: ${S.photos.length}枚（上記に添付）

【返すJSON】:
{
  "overallStatus": "良好 または 要確認 または 要是正",
  "progressPct": 0〜100の数値,
  "issueCount": 要確認事項の件数,
  "urgentCount": 緊急是正の件数,
  "milestoneStatus": [
    {"name": "マイルストーン名", "pct": 0〜100, "note": "写真から読み取れる状況1文"}
  ],
  "photos": [
    {
      "subject": "写真の内容・部位名（例：基礎配筋状況）",
      "riskLevel": "問題なし または 要確認 または 要是正 または 確認不可",
      "findings": "写真から読み取れる内容・状態（3〜4文、具体的に）",
      "tags": [
        {"label": "タグ名（例：配筋ピッチOK）", "type": "ok または warn または ng"}
      ],
      "actionRequired": "是正・確認が必要な場合のみ記載（不要な場合はnull）"
    }
  ],
  "recommendations": [
    {
      "priority": "高 または 中 または 低",
      "title": "是正・確認事項のタイトル",
      "body": "具体的な内容・理由・対処法（2〜3文）",
      "who": "担当者（例：現場監督、施工業者、設計士）"
    }
  ],
  "overallComment": "現場全体の総合所見（4〜5文。良い点・懸念点・次のステップを含む）"
}

写真の枚数分だけphotosを返すこと。milestoneStatusは添付写真から判断できるもののみ。`};

  try{
    const res=await fetch('/api/ai',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:3000,
        messages:[{role:'user',content:[textBlock,...imageBlocks]}]
      })
    });
    const data=await res.json();
    if(data.error) throw new Error(data.error.message);
    const raw=(data.content||[]).map(i=>i.text||'').join('');
    const start=raw.indexOf('{'); let jstr=start>=0?raw.slice(start):raw;
    jstr=jstr.replace(/```json|```/g,'').trim();
    let parsed;
    try{parsed=JSON.parse(jstr);}
    catch(e1){
      // repair unclosed JSON
      const stack=[]; let inStr=false,esc=false,rep=jstr;
      for(const ch of jstr){
        if(esc){esc=false;continue;} if(ch==='\\'){esc=true;continue;}
        if(ch==='"'){inStr=!inStr;continue;} if(inStr) continue;
        if(ch==='{'||ch==='[') stack.push(ch==='{'?'}':']');
        else if(ch==='}'||ch===']') stack.pop();
      }
      rep=rep.replace(/,\s*$/,'');
      while(stack.length) rep+=stack.pop();
      try{parsed=JSON.parse(rep);}catch(e2){throw new Error('JSONパースエラー: '+e1.message);}
    }
    S.result=parsed;
    const bar=document.getElementById('anaBar');if(bar)bar.style.width='100%';
    const last=document.getElementById(ids[ids.length-1]);if(last){last.classList.remove('act');last.classList.add('done');}
    setTimeout(()=>{S.step=4;render();},700);
  }catch(e){
    S.error='解析中にエラーが発生しました。<br><br><small style="opacity:.6">'+e.message+'</small>';
    S.step=4;render();
  }
}

render();
</script>
</body>
</html>
