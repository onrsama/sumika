<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SUMIKA — 住宅会社専用 SaaS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Sans+JP:wght@300;400;500&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:    #FAF8F5;
  --bg2:   #F0ECE6;
  --ink:   #1C2422;
  --ink2:  #4A5E5A;
  --ink3:  #8AADA8;
  --gold:  #1F7A72;
  --goldd: #186660;
  --gbdr:  rgba(31,122,114,.22);
  --bdr:   rgba(28,36,34,.09);
  --bdr2:  rgba(28,36,34,.16);
  --serif: 'Cormorant Garamond',serif;
  --sans:  'Sora',sans-serif;
  --jp:    'Noto Sans JP',sans-serif;
}
html,body{
  height:100%;background:var(--bg);color:var(--ink);
  font-family:var(--sans);font-size:14px;line-height:1.6;overflow:hidden
}

/* ── SHELL ── */
.shell{height:100vh;display:grid;grid-template-rows:auto 1fr auto}

/* ── HEADER ── */
header{
  padding:16px 40px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--bdr);background:var(--bg);flex-shrink:0
}
.logo{font-family:var(--serif);font-size:22px;font-weight:400;color:var(--ink);letter-spacing:.04em}
.logo b{color:var(--gold);font-weight:600}
.header-right{display:flex;align-items:center;gap:28px}
.header-tag{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink3)}
.header-cta{
  background:var(--ink);color:var(--bg);font-size:11px;font-weight:500;
  letter-spacing:.1em;text-transform:uppercase;padding:9px 22px;
  border:none;border-radius:2px;cursor:pointer;transition:background .2s
}
.header-cta:hover{background:var(--gold)}

/* ── MAIN ── */
main{overflow:hidden;display:flex;flex-direction:column;padding:22px 40px 0;gap:14px;min-height:0}

/* ── PAGE INTRO ── */
.page-intro{display:flex;align-items:baseline;justify-content:space-between;flex-shrink:0}
.page-title{font-family:var(--serif);font-size:30px;font-weight:300;color:var(--ink);display:flex;align-items:baseline;gap:10px;line-height:1}
.page-title em{font-style:italic;color:var(--gold)}
.page-sub{font-size:11px;font-family:var(--jp);color:var(--ink3);margin-top:3px}
.tool-count{font-size:11px;color:var(--ink3);letter-spacing:.08em}
.tool-count b{color:var(--gold);font-weight:600}

/* ── FILTERS ── */
.filters{display:flex;gap:6px;flex-wrap:nowrap;flex-shrink:0}
.filter-btn{
  padding:5px 14px;border-radius:2px;font-size:10.5px;font-weight:500;
  letter-spacing:.1em;text-transform:uppercase;cursor:pointer;
  border:1px solid var(--bdr2);background:transparent;color:var(--ink2);
  font-family:var(--sans);transition:all .18s;white-space:nowrap
}
.filter-btn.active{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.filter-btn:hover:not(.active){border-color:var(--gold);color:var(--gold)}

/* ── GRID ── */
.grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
  overflow:hidden;
  flex:1;
  min-height:0;
  padding-bottom:22px;
}

/* ── CARD ── */
.card{
  background:#fff;border:1px solid var(--bdr);border-radius:4px;
  padding:16px 15px 14px;display:flex;flex-direction:column;gap:0;
  cursor:pointer;transition:all .22s;position:relative;overflow:hidden;
  min-height:0;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--gold);transform:scaleX(0);transform-origin:left;
  transition:transform .28s ease
}
.card:hover{border-color:var(--bdr2);transform:translateY(-2px);box-shadow:0 6px 20px rgba(28,36,34,.08)}
.card:hover::before{transform:scaleX(1)}
.card:hover .card-icon svg{opacity:.9;transform:scale(1.05)}

/* card top row: icon left, num right */
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.card-icon{
  width:34px;height:34px;border-radius:6px;
  background:var(--bg2);display:flex;align-items:center;justify-content:center;flex-shrink:0
}
.card-icon svg{width:18px;height:18px;stroke:var(--gold);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;opacity:.7;transition:all .22s}
.card-num{font-family:var(--serif);font-size:26px;font-weight:300;color:rgba(31,122,114,.18);line-height:1}

/* cat label */
.card-cat{
  font-size:9px;letter-spacing:.17em;text-transform:uppercase;
  color:var(--ink3);margin-bottom:7px;display:flex;align-items:center;gap:5px
}
.cat-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}

/* title / en */
.card-title{font-size:12.5px;font-weight:500;color:var(--ink);line-height:1.35;margin-bottom:2px}
.card-en{font-size:9.5px;color:var(--ink3);margin-bottom:8px;line-height:1.3}

/* body — fills remaining space, hides overflow cleanly */
.card-body{
  font-size:10.5px;font-family:var(--jp);color:var(--ink2);
  line-height:1.7;flex:1;min-height:0;overflow:hidden;
}

/* footer */
.card-footer{
  margin-top:10px;padding-top:9px;border-top:1px solid var(--bdr);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0
}
.card-tag{font-size:9px;letter-spacing:.06em;color:var(--gold);border:1px solid var(--gbdr);padding:2px 8px;border-radius:20px;white-space:nowrap}
.card-price{font-size:9.5px;color:var(--ink3);white-space:nowrap}

/* ── CAT DOT COLORS ── */
.c-sales   {background:#2E8B7A}
.c-design  {background:#3D7FAA}
.c-ops     {background:#5C9E6E}
.c-comp    {background:#6B7AAA}
.c-finance {background:#AA7840}
.c-after   {background:#7A6BAA}

/* ── FOOTER ── */
footer{
  border-top:1px solid var(--bdr);padding:10px 40px;
  display:flex;align-items:center;justify-content:space-between;
  background:var(--bg);flex-shrink:0
}
footer span{font-size:10px;color:var(--ink3);font-family:var(--jp)}
footer .ver{font-family:var(--sans);letter-spacing:.08em}

/* ── MODAL SOON BADGE ── */
.modal-soon{
  display:inline-flex;align-items:center;gap:6px;
  font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--ink3);border:1px solid var(--bdr2);
  background:var(--bg2);border-radius:20px;padding:3px 12px;margin-bottom:12px
}
.modal-overlay{
  position:fixed;inset:0;background:rgba(28,36,34,.4);z-index:200;
  display:flex;align-items:center;justify-content:center;padding:24px;
  opacity:0;pointer-events:none;transition:opacity .22s
}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{
  background:var(--bg);border:1px solid var(--bdr2);border-radius:6px;
  max-width:500px;width:100%;padding:36px;
  transform:translateY(10px);transition:transform .28s ease;position:relative
}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-close{
  position:absolute;top:14px;right:14px;width:28px;height:28px;
  background:var(--bg2);border:none;border-radius:2px;cursor:pointer;
  font-size:13px;color:var(--ink2);display:flex;align-items:center;justify-content:center
}
.modal-header{display:flex;align-items:flex-start;gap:14px;margin-bottom:20px}
.modal-icon{width:44px;height:44px;border-radius:8px;background:var(--bg2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.modal-icon svg{width:22px;height:22px;stroke:var(--gold);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.modal-cat{font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:5px;display:flex;align-items:center;gap:7px}
.modal-title{font-family:var(--serif);font-size:26px;font-weight:300;color:var(--ink);line-height:1.2}
.modal-en{font-size:11.5px;color:var(--ink3);margin-top:3px}
.modal-section{margin-bottom:14px}
.modal-label{font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px}
.modal-text{font-size:13px;font-family:var(--jp);color:var(--ink2);line-height:1.85}
.modal-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.modal-stat{background:var(--bg2);border-radius:3px;padding:12px 14px}
.modal-stat-val{font-family:var(--serif);font-size:19px;font-weight:300;color:var(--gold)}
.modal-stat-lbl{font-size:10px;color:var(--ink3);font-family:var(--jp);margin-top:2px}
.modal-btn{
  width:100%;margin-top:20px;padding:11px;background:var(--ink);color:var(--bg);
  border:none;border-radius:2px;font-family:var(--sans);font-size:11.5px;
  letter-spacing:.1em;text-transform:uppercase;font-weight:500;cursor:pointer;transition:background .2s
}
.modal-btn:hover{background:var(--gold)}
</style>
</head>
<body>
<div class="shell">

  <header>
    <div class="logo">SUMI<b>KA</b></div>
    <div class="header-right">
      <span class="header-tag">住宅会社専用 SaaSプラットフォーム</span>
      <button class="header-cta">無料で試す</button>
    </div>
  </header>

  <main>
    <div class="page-intro">
      <div>
        <div class="page-title">サービス<em>一覧</em></div>
        <div class="page-sub">住宅業務のすべてをカバーする専門AIツール群</div>
      </div>
      <div class="tool-count"><b id="visCount">20</b> tools available</div>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-cat="all">All</button>
      <button class="filter-btn" data-cat="Sales & CX">Sales & CX</button>
      <button class="filter-btn" data-cat="Design & Viz">Design & Viz</button>
      <button class="filter-btn" data-cat="Operations">Operations</button>
      <button class="filter-btn" data-cat="Compliance">Compliance</button>
      <button class="filter-btn" data-cat="Finance">Finance</button>
      <button class="filter-btn" data-cat="After-Sales">After-Sales</button>
    </div>

    <div class="grid" id="grid"></div>
  </main>

  <footer>
    <span>© 2025 SUMIKA Inc. — 住宅業界のDXを、共に。</span>
    <span class="ver">v1.0 · Prototype</span>
  </footer>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModalDirect()">✕</button>
    <div class="modal-header">
      <div class="modal-icon" id="mIcon"></div>
      <div>
        <div class="modal-cat" id="mCat"></div>
        <div class="modal-title" id="mTitle"></div>
        <div class="modal-en" id="mEn"></div>
      </div>
    </div>
    <div class="modal-section">
      <div class="modal-label">課題・背景</div>
      <div class="modal-text" id="mPain"></div>
    </div>
    <div class="modal-section">
      <div class="modal-label">解決策</div>
      <div class="modal-text" id="mSolution"></div>
    </div>
    <div class="modal-row">
      <div class="modal-stat"><div class="modal-stat-val" id="mRev"></div><div class="modal-stat-lbl">想定月額</div></div>
      <div class="modal-stat"><div class="modal-stat-val" id="mTag"></div><div class="modal-stat-lbl">ポジション</div></div>
    </div>
    <button class="modal-btn" id="mBtn">このサービスを試す →</button>
  </div>
</div>

let activeFilter='all';

function renderGrid(){
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  let count=0;
  tools.forEach(t=>{
    if(activeFilter!=='all'&&t.cat!==activeFilter) return;
    count++;
    const dc=catColor[t.cat]||'';
    const iconSvg=icons[t.id]||icons["01"];
    const div=document.createElement('div');
    div.className='card';
    div.innerHTML=`
      <div class="card-top">
        <div class="card-icon">${iconSvg}</div>
        <div class="card-num">${t.id}</div>
      </div>
      <div class="card-cat"><span class="cat-dot ${dc}"></span>${t.cat}</div>
      <div class="card-title">${t.title}</div>
      <div class="card-en">${t.en}</div>
      <div class="card-body">${t.pain}</div>
      <div class="card-footer">
        <span class="card-tag">${t.tag}</span>
        <span class="card-price">${t.rev}</span>
      </div>`;
    div.addEventListener('click',()=>openModal(t));
    grid.appendChild(div);
  });
  document.getElementById('visCount').textContent=count;
  const cols=count<=3?count:count<=6?3:count<=8?4:5;
  grid.style.gridTemplateColumns=`repeat(${cols},1fr)`;
}

/* ── SERVICE ROUTES ── */
const routes={
  "01":"sumika-proposal.html",
};

function openModal(t){
  const dc=catColor[t.cat]||'';
  const iconSvg=icons[t.id]||icons["01"];
  document.getElementById('mIcon').innerHTML=iconSvg;
  document.getElementById('mIcon').querySelector('svg').style.cssText='width:22px;height:22px;stroke:var(--gold);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round';
  document.getElementById('mCat').innerHTML=`<span class="cat-dot ${dc}" style="width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0"></span>${t.cat}`;
  document.getElementById('mTitle').textContent=t.title;
  document.getElementById('mEn').textContent=t.en;
  document.getElementById('mPain').textContent=t.pain;
  document.getElementById('mSolution').textContent=t.solution;
  document.getElementById('mRev').textContent=t.rev;
  document.getElementById('mTag').textContent=t.tag;
  const btn=document.getElementById('mBtn');
  if(routes[t.id]){
    btn.textContent='このサービスを試す →';
    btn.style.opacity='1';btn.style.cursor='pointer';
    btn.onclick=()=>{ window.location.href=routes[t.id]; };
  } else {
    btn.textContent='近日公開 — Coming Soon';
    btn.style.opacity='.45';btn.style.cursor='default';
    btn.onclick=null;
  }
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(e){if(e.target===document.getElementById('modalOverlay'))closeModalDirect();}
function closeModalDirect(){document.getElementById('modalOverlay').classList.remove('open');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModalDirect();});

document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter=btn.dataset.cat;
    renderGrid();
  });
});
